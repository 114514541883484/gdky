<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>卡密管理后台</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
  }

  .header h1 {
    color: #fff;
    font-size: 28px;
    margin-bottom: 10px;
  }

  .header p {
    color: #888;
    font-size: 14px;
  }

  /* 登录框 */
  .login-box {
    max-width: 400px;
    margin: 100px auto;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 40px;
  }

  .login-box h2 {
    color: #fff;
    text-align: center;
    margin-bottom: 30px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    color: #c0c0c0;
    font-size: 13px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  input[type="password"],
  input[type="text"],
  textarea,
  select {
    width: 100%;
    padding: 15px 20px;
    background: rgba(0, 0, 0, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    transition: all 0.3s ease;
  }

  textarea {
    min-height: 200px;
    resize: vertical;
    font-family: 'Consolas', 'Monaco', monospace;
  }

  input:focus,
  textarea:focus,
  select:focus {
    outline: none;
    border-color: #e94560;
    background: rgba(0, 0, 0, 0.4);
  }

  button {
    padding: 12px 24px;
    background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
  }

  .btn-full {
    width: 100%;
  }

  .btn-secondary {
    background: linear-gradient(135deg, #4a5568 0%, #718096 100%);
  }

  .btn-danger {
    background: linear-gradient(135deg, #e53e3e 0%, #fc8181 100%);
  }

  .btn-success {
    background: linear-gradient(135deg, #38a169 0%, #68d391 100%);
  }

  /* 面板 */
  .panel {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
  }

  .panel h2 {
    color: #fff;
    font-size: 20px;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* 统计卡片 */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .stat-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
  }

  .stat-card h3 {
    color: #888;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .stat-card .number {
    color: #fff;
    font-size: 36px;
    font-weight: bold;
  }

  /* 卡密列表 */
  .key-list {
    max-height: 400px;
    overflow-y: auto;
  }

  .key-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .key-info {
    flex: 1;
  }

  .key-code {
    color: #e94560;
    font-family: 'Consolas', monospace;
    font-size: 16px;
    font-weight: bold;
  }

  .key-meta {
    color: #888;
    font-size: 12px;
    margin-top: 5px;
  }

  .key-status {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .key-status.used {
    background: rgba(255, 71, 87, 0.2);
    color: #ff4757;
  }

  .key-status.unused {
    background: rgba(46, 213, 115, 0.2);
    color: #2ed573;
  }

  .key-actions {
    display: flex;
    gap: 10px;
    margin-left: 15px;
  }

  .key-actions button {
    padding: 8px 16px;
    font-size: 12px;
  }

  /* 生成卡密区域 */
  .generate-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 768px) {
    .generate-section {
      grid-template-columns: 1fr;
    }
  }

  /* 脚本管理 */
  .script-item {
    padding: 20px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
    margin-bottom: 15px;
  }

  .script-item h4 {
    color: #fff;
    margin-bottom: 10px;
  }

  .script-item p {
    color: #888;
    font-size: 13px;
    margin-bottom: 15px;
  }

  .script-actions {
    display: flex;
    gap: 10px;
  }

  /* 设置 */
  .setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .setting-item:last-child {
    border-bottom: none;
  }

  .setting-label {
    color: #fff;
  }

  .setting-desc {
    color: #888;
    font-size: 12px;
  }

  /* 切换开关 */
  .toggle {
    position: relative;
    width: 50px;
    height: 26px;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #4a5568;
    transition: .4s;
    border-radius: 26px;
  }

  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 4px;
    bottom: 4px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
  }

  input:checked + .toggle-slider {
    background-color: #e94560;
  }

  input:checked + .toggle-slider:before {
    transform: translateX(24px);
  }

  /* 导出按钮组 */
  .export-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  /* 隐藏类 */
  .hidden {
    display: none !important;
  }

  /* 消息提示 */
  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 15px 25px;
    background: rgba(46, 213, 115, 0.9);
    color: #fff;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    transform: translateX(400px);
    transition: transform 0.3s ease;
  }

  .toast.show {
    transform: translateX(0);
  }

  .toast.error {
    background: rgba(255, 71, 87, 0.9);
  }

  /* 返回链接 */
  .back-link {
    display: inline-block;
    margin-top: 20px;
    color: #888;
    text-decoration: none;
    font-size: 14px;
  }

  .back-link:hover {
    color: #e94560;
  }
</style>
</head>
<body>

<div class="container">
  <!-- 登录界面 -->
  <div id="loginView" class="login-box">
    <h2>🔐 管理后台登录</h2>
    <div class="input-group">
      <label>管理密码</label>
      <input type="password" id="adminPassword" placeholder="请输入管理密码">
    </div>
    <button class="btn-full" onclick="login()">登录</button>
    <div style="text-align: center;">
      <a href="index.html" class="back-link">← 返回验证页面</a>
    </div>
  </div>

  <!-- 管理面板 -->
  <div id="adminView" class="hidden">
    <div class="header">
      <h1>⚙️ 卡密管理后台</h1>
      <p>管理系统卡密、脚本和设置</p>
      <button class="btn-secondary" onclick="logout()" style="margin-top: 15px;">退出登录</button>
    </div>

    <!-- 统计 -->
    <div class="stats">
      <div class="stat-card">
        <h3>总卡密数</h3>
        <div class="number" id="totalKeys">0</div>
      </div>
      <div class="stat-card">
        <h3>已使用</h3>
        <div class="number" id="usedKeys">0</div>
      </div>
      <div class="stat-card">
        <h3>未使用</h3>
        <div class="number" id="unusedKeys">0</div>
      </div>
      <div class="stat-card">
        <h3>脚本数量</h3>
        <div class="number" id="scriptCount">0</div>
      </div>
    </div>

    <!-- 生成卡密 -->
    <div class="panel">
      <h2>🎫 生成卡密</h2>
      <div class="generate-section">
        <div class="input-group">
          <label>生成数量</label>
          <input type="number" id="generateCount" value="5" min="1" max="100">
        </div>
        <div class="input-group">
          <label>关联脚本</label>
          <select id="generateScriptId">
            <option value="default">默认脚本</option>
          </select>
        </div>
      </div>
      <button onclick="generateKeys()">生成卡密</button>
      <div class="export-buttons">
        <button class="btn-success" onclick="exportKeys()">📋 导出卡密</button>
        <button class="btn-secondary" onclick="clearAllKeys()">🗑️ 清空所有卡密</button>
      </div>
    </div>

    <!-- 卡密列表 -->
    <div class="panel">
      <h2>📋 卡密列表</h2>
      <div class="key-list" id="keyList">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 脚本管理 -->
    <div class="panel">
      <h2>📝 脚本管理</h2>
      <div id="scriptList">
        <!-- 动态生成 -->
      </div>
      <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
        <h3 style="color: #fff; margin-bottom: 15px;">添加新脚本</h3>
        <div class="input-group">
          <label>脚本ID (唯一标识)</label>
          <input type="text" id="newScriptId" placeholder="例如: script1">
        </div>
        <div class="input-group">
          <label>脚本名称</label>
          <input type="text" id="newScriptName" placeholder="例如: 我的脚本">
        </div>
        <div class="input-group">
          <label>脚本描述</label>
          <input type="text" id="newScriptDesc" placeholder="简短描述">
        </div>
        <div class="input-group">
          <label>脚本内容</label>
          <textarea id="newScriptContent" placeholder="在此粘贴脚本代码..."></textarea>
        </div>
        <button onclick="addScript()">添加脚本</button>
      </div>
    </div>

    <!-- 系统设置 -->
    <div class="panel">
      <h2>⚙️ 系统设置</h2>
      <div class="setting-item">
        <div>
          <div class="setting-label">允许卡密重复使用</div>
          <div class="setting-desc">开启后，卡密可以多次使用</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="allowReuse" onchange="updateSettings()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <div>
          <div class="setting-label">修改管理密码</div>
          <div class="setting-desc">设置新的后台管理密码</div>
        </div>
        <button onclick="changePassword()">修改密码</button>
      </div>
      <div class="setting-item">
        <div>
          <div class="setting-label">导出所有数据</div>
          <div class="setting-desc">导出为JSON文件备份</div>
        </div>
        <button class="btn-success" onclick="exportAllData()">导出数据</button>
      </div>
      <div class="setting-item">
        <div>
          <div class="setting-label">导入数据</div>
          <div class="setting-desc">从JSON文件恢复数据</div>
        </div>
        <input type="file" id="importFile" accept=".json" onchange="importData(this)" style="display: none;">
        <button onclick="document.getElementById('importFile').click()">导入数据</button>
      </div>
    </div>
  </div>
</div>

<!-- 提示消息 -->
<div class="toast" id="toast"></div>

<script>
// 数据存储
let keyData = {
  keys: [],
  scripts: {
    "default": {
      name: "默认脚本",
      content: "-- 欢迎使用卡密系统\n-- 请在管理后台添加脚本内容",
      description: "默认脚本"
    }
  },
  settings: {
    adminPassword: "admin123",
    allowReuse: false
  }
};

// 初始化
function init() {
  const saved = localStorage.getItem('keySystemData');
  if (saved) {
    keyData = JSON.parse(saved);
  } else {
    saveData();
  }
}

// 保存数据
function saveData() {
  localStorage.setItem('keySystemData', JSON.stringify(keyData));
}

// 登录
function login() {
  const password = document.getElementById('adminPassword').value;
  if (password === keyData.settings.adminPassword) {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    sessionStorage.setItem('adminLoggedIn', 'true');
    updateUI();
  } else {
    showToast('密码错误', 'error');
  }
}

// 退出登录
function logout() {
  sessionStorage.removeItem('adminLoggedIn');
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('adminPassword').value = '';
}

// 检查登录状态
function checkLogin() {
  if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('adminView').classList.remove('hidden');
    updateUI();
  }
}

// 更新UI
function updateUI() {
  updateStats();
  renderKeyList();
  renderScriptList();
  updateScriptSelect();
  document.getElementById('allowReuse').checked = keyData.settings.allowReuse;
}

// 更新统计
function updateStats() {
  const total = keyData.keys.length;
  const used = keyData.keys.filter(k => k.used).length;
  const unused = total - used;
  const scriptCount = Object.keys(keyData.scripts).length;

  document.getElementById('totalKeys').textContent = total;
  document.getElementById('usedKeys').textContent = used;
  document.getElementById('unusedKeys').textContent = unused;
  document.getElementById('scriptCount').textContent = scriptCount;
}

// 生成卡密
function generateKeys() {
  const count = parseInt(document.getElementById('generateCount').value) || 5;
  const scriptId = document.getElementById('generateScriptId').value;
  const newKeys = [];

  for (let i = 0; i < count; i++) {
    const key = generateRandomKey();
    keyData.keys.push({
      key: key,
      used: false,
      createdAt: new Date().toISOString(),
      usedAt: null,
      usedBy: null,
      scriptId: scriptId
    });
    newKeys.push(key);
  }

  saveData();
  updateUI();
  showToast(`成功生成 ${count} 个卡密`);
}

// 生成随机卡密
function generateRandomKey() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let key = '';
  for (let i = 0; i < 16; i++) {
    if (i > 0 && i % 4 === 0) key += '-';
    key += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return key;
}

// 渲染卡密列表
function renderKeyList() {
  const container = document.getElementById('keyList');
  if (keyData.keys.length === 0) {
    container.innerHTML = '<p style="color: #888; text-align: center;">暂无卡密</p>';
    return;
  }

  container.innerHTML = keyData.keys.slice().reverse().map((k, index) => `
    <div class="key-item">
      <div class="key-info">
        <div class="key-code">${k.key}</div>
        <div class="key-meta">
          ${k.used ? `已使用: ${new Date(k.usedAt).toLocaleString()}` : '未使用'}
          ${k.scriptId ? ` | 脚本: ${keyData.scripts[k.scriptId]?.name || k.scriptId}` : ''}
        </div>
      </div>
      <span class="key-status ${k.used ? 'used' : 'unused'}">${k.used ? '已使用' : '未使用'}</span>
      <div class="key-actions">
        <button class="btn-secondary" onclick="copyKey('${k.key}')">复制</button>
        <button class="btn-danger" onclick="deleteKey(${keyData.keys.length - 1 - index})">删除</button>
      </div>
    </div>
  `).join('');
}

// 复制卡密
function copyKey(key) {
  navigator.clipboard.writeText(key);
  showToast('卡密已复制');
}

// 删除卡密
function deleteKey(index) {
  if (confirm('确定要删除这个卡密吗？')) {
    keyData.keys.splice(index, 1);
    saveData();
    updateUI();
    showToast('卡密已删除');
  }
}

// 清空所有卡密
function clearAllKeys() {
  if (confirm('确定要清空所有卡密吗？此操作不可恢复！')) {
    keyData.keys = [];
    saveData();
    updateUI();
    showToast('所有卡密已清空');
  }
}

// 导出卡密
function exportKeys() {
  if (keyData.keys.length === 0) {
    showToast('没有卡密可导出', 'error');
    return;
  }

  const unusedKeys = keyData.keys.filter(k => !k.used);
  const content = unusedKeys.map(k => k.key).join('\n');

  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `卡密列表_${new Date().toLocaleDateString()}.txt`;
  a.click();
  URL.revokeObjectURL(url);

  showToast('卡密已导出');
}

// 渲染脚本列表
function renderScriptList() {
  const container = document.getElementById('scriptList');
  container.innerHTML = Object.entries(keyData.scripts).map(([id, script]) => `
    <div class="script-item">
      <h4>${script.name} <span style="color: #888; font-size: 12px;">(${id})</span></h4>
      <p>${script.description || '无描述'}</p>
      <div class="script-actions">
        <button onclick="editScript('${id}')">编辑</button>
        ${id !== 'default' ? `<button class="btn-danger" onclick="deleteScript('${id}')">删除</button>` : ''}
      </div>
    </div>
  `).join('');
}

// 更新脚本选择下拉框
function updateScriptSelect() {
  const select = document.getElementById('generateScriptId');
  select.innerHTML = Object.entries(keyData.scripts).map(([id, script]) =>
    `<option value="${id}">${script.name}</option>`
  ).join('');
}

// 添加脚本
function addScript() {
  const id = document.getElementById('newScriptId').value.trim();
  const name = document.getElementById('newScriptName').value.trim();
  const desc = document.getElementById('newScriptDesc').value.trim();
  const content = document.getElementById('newScriptContent').value;

  if (!id || !name || !content) {
    showToast('请填写完整信息', 'error');
    return;
  }

  if (keyData.scripts[id]) {
    showToast('脚本ID已存在', 'error');
    return;
  }

  keyData.scripts[id] = {
    name: name,
    description: desc,
    content: content
  };

  saveData();
  updateUI();

  // 清空表单
  document.getElementById('newScriptId').value = '';
  document.getElementById('newScriptName').value = '';
  document.getElementById('newScriptDesc').value = '';
  document.getElementById('newScriptContent').value = '';

  showToast('脚本添加成功');
}

// 编辑脚本
function editScript(id) {
  const script = keyData.scripts[id];
  const newContent = prompt('编辑脚本内容:', script.content);
  if (newContent !== null) {
    script.content = newContent;
    saveData();
    showToast('脚本已更新');
  }
}

// 删除脚本
function deleteScript(id) {
  if (confirm('确定要删除这个脚本吗？')) {
    delete keyData.scripts[id];
    // 更新关联的卡密
    keyData.keys.forEach(k => {
      if (k.scriptId === id) {
        k.scriptId = 'default';
      }
    });
    saveData();
    updateUI();
    showToast('脚本已删除');
  }
}

// 更新设置
function updateSettings() {
  keyData.settings.allowReuse = document.getElementById('allowReuse').checked;
  saveData();
  showToast('设置已保存');
}

// 修改密码
function changePassword() {
  const newPassword = prompt('请输入新密码:');
  if (newPassword && newPassword.trim()) {
    keyData.settings.adminPassword = newPassword.trim();
    saveData();
    showToast('密码已修改');
  }
}

// 导出所有数据
function exportAllData() {
  const dataStr = JSON.stringify(keyData, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `卡密系统备份_${new Date().toLocaleDateString()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出');
}

// 导入数据
function importData(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.keys && data.scripts && data.settings) {
        keyData = data;
        saveData();
        updateUI();
        showToast('数据导入成功');
      } else {
        showToast('数据格式错误', 'error');
      }
    } catch (err) {
      showToast('文件解析失败', 'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// 显示提示
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + type;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// 回车登录
document.getElementById('adminPassword')?.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    login();
  }
});

// 页面加载
init();
checkLogin();
</script>
