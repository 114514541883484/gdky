<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>卡密验证系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 450px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
  }

  .logo {
    text-align: center;
    margin-bottom: 30px;
  }

  .logo-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 36px;
  }

  h1 {
    color: #fff;
    font-size: 24px;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #a0a0a0;
    font-size: 14px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    color: #c0c0c0;
    font-size: 13px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  input[type="text"] {
    width: 100%;
    padding: 15px 20px;
    background: rgba(0, 0, 0, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: #e94560;
    background: rgba(0, 0, 0, 0.4);
  }

  input[type="text"]::placeholder {
    color: #666;
  }

  button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
  }

  button:active {
    transform: translateY(0);
  }

  .message {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  .message.success {
    background: rgba(46, 213, 115, 0.2);
    border: 1px solid rgba(46, 213, 115, 0.3);
    color: #2ed573;
    display: block;
  }

  .message.error {
    background: rgba(255, 71, 87, 0.2);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: #ff4757;
    display: block;
  }

  .admin-link {
    text-align: center;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }

  .admin-link a {
    color: #888;
    text-decoration: none;
    font-size: 13px;
    transition: color 0.3s ease;
  }

  .admin-link a:hover {
    color: #e94560;
  }

  /* 脚本内容显示区域 */
  .script-content {
    display: none;
    margin-top: 30px;
  }

  .script-content.show {
    display: block;
  }

  .script-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .script-header h3 {
    color: #fff;
    font-size: 16px;
  }

  .copy-btn {
    width: auto;
    padding: 8px 16px;
    font-size: 12px;
  }

  .script-box {
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    padding: 20px;
    max-height: 400px;
    overflow-y: auto;
  }

  .script-box pre {
    color: #a8d8ea;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .script-box pre .keyword { color: #ff79c6; }
  .script-box pre .function { color: #8be9fd; }
  .script-box pre .string { color: #f1fa8c; }
  .script-box pre .comment { color: #6272a4; }
  .script-box pre .number { color: #bd93f9; }

  .execution-tip {
    background: rgba(255, 175, 0, 0.1);
    border: 1px solid rgba(255, 175, 0, 0.3);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
    color: #ffaf00;
    font-size: 13px;
  }

  .execution-tip strong {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
  }

  .execution-tip ol {
    margin: 0;
    padding-left: 20px;
  }

  .execution-tip li {
    margin-bottom: 5px;
  }

  .loading {
    display: none;
    text-align: center;
    margin-top: 20px;
  }

  .loading.show {
    display: block;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h1>卡密验证系统</h1>
    <p class="subtitle">请输入您的卡密以获取访问权限</p>
  </div>

  <div class="input-group">
    <label>卡密</label>
    <input type="text" id="keyInput" placeholder="请输入卡密..." autocomplete="off">
  </div>

  <button onclick="verifyKey()">验证卡密</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color: #888; font-size: 13px;">验证中...</p>
  </div>

  <div class="message" id="message"></div>

  <!-- 脚本内容显示区域 -->
  <div class="script-content" id="scriptContent">
    <div class="execution-tip">
      <strong>🎮 Roblox 脚本执行方法：</strong>
      <ol>
        <li>点击"复制脚本"按钮复制代码</li>
        <li>打开 Roblox 游戏</li>
        <li>使用支持的执行器（如 Synapse X, KRNL, Fluxus 等）</li>
        <li>粘贴脚本并执行</li>
      </ol>
    </div>
    <div class="script-header">
      <h3>📝 脚本内容 (Lua)</h3>
      <button class="copy-btn" onclick="copyScript()">📋 复制脚本</button>
    </div>
    <div class="script-box">
      <pre id="scriptText"></pre>
    </div>
  </div>

  <div class="admin-link">
    <a href="admin.html">⚙️ 管理后台</a>
  </div>
</div>

<script>
// 卡密数据存储（实际使用时应该从服务器获取）
let keyData = null;

// 从 localStorage 或 GitHub 加载数据
async function loadKeyData() {
  // 尝试从 localStorage 获取
  const localData = localStorage.getItem('keySystemData');
  if (localData) {
    keyData = JSON.parse(localData);
    return;
  }

  // 如果没有本地数据，使用默认数据
  keyData = {
    keys: [],
    scripts: {
      "default": {
        name: "Roblox 示例脚本",
        content: "-- Roblox 示例脚本\n-- 欢迎使用卡密系统\n\nlocal player = game.Players.LocalPlayer\nlocal character = player.Character or player.CharacterAdded:Wait()\n\n-- 示例功能：打印玩家信息\nprint('玩家名称: ' .. player.Name)\nprint('用户ID: ' .. player.UserId)\n\n-- 示例功能：发送通知\ngame.StarterGui:SetCore('SendNotification', {\n    Title = '卡密系统',\n    Text = '脚本加载成功！',\n    Duration = 5\n})",
        description: "Roblox Lua 示例脚本"
      }
    },
    settings: {
      adminPassword: "admin123",
      allowReuse: false
    }
  };
}

// 验证卡密
async function verifyKey() {
  const keyInput = document.getElementById('keyInput');
  const message = document.getElementById('message');
  const loading = document.getElementById('loading');
  const scriptContent = document.getElementById('scriptContent');
  const scriptText = document.getElementById('scriptText');

  const inputKey = keyInput.value.trim().toUpperCase();

  if (!inputKey) {
    showMessage('请输入卡密', 'error');
    return;
  }

  // 显示加载
  loading.classList.add('show');
  message.className = 'message';
  scriptContent.classList.remove('show');

  // 模拟网络延迟
  await new Promise(resolve => setTimeout(resolve, 800));

  await loadKeyData();

  // 查找卡密
  const keyObj = keyData.keys.find(k => k.key === inputKey);

  if (!keyObj) {
    loading.classList.remove('show');
    showMessage('卡密无效', 'error');
    return;
  }

  if (keyObj.used && !keyData.settings.allowReuse) {
    loading.classList.remove('show');
    showMessage('该卡密已被使用', 'error');
    return;
  }

  // 标记卡密为已使用
  if (!keyData.settings.allowReuse) {
    keyObj.used = true;
    keyObj.usedAt = new Date().toISOString();
    keyObj.usedBy = navigator.userAgent;
    localStorage.setItem('keySystemData', JSON.stringify(keyData));
  }

  // 显示脚本内容
  loading.classList.remove('show');
  showMessage('验证成功！', 'success');

  // 获取脚本内容
  const script = keyData.scripts[keyObj.scriptId || 'default'] || keyData.scripts['default'];
  scriptText.innerHTML = highlightLua(script.content);
  scriptContent.classList.add('show');
}

// 显示消息
function showMessage(text, type) {
  const message = document.getElementById('message');
  message.textContent = text;
  message.className = 'message ' + type;
}

// 复制脚本
function copyScript() {
  const scriptText = document.getElementById('scriptText').textContent;
  navigator.clipboard.writeText(scriptText).then(() => {
    const btn = document.querySelector('.copy-btn');
    const originalText = btn.textContent;
    btn.textContent = '已复制!';
    setTimeout(() => {
      btn.textContent = originalText;
    }, 2000);
  });
}

// 回车键提交
document.getElementById('keyInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    verifyKey();
  }
});

// Lua 语法高亮
function highlightLua(code) {
  if (!code) return '';

  // 转义 HTML
  code = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // 高亮注释
  code = code.replace(/(--.*$)/gm, '<span class="comment">$1</span>');

  // 高亮字符串
  code = code.replace(/(".*?")/g, '<span class="string">$1</span>');
  code = code.replace(/('.*?')/g, '<span class="string">$1</span>');

  // 高亮关键字
  const keywords = ['local', 'function', 'end', 'if', 'then', 'else', 'elseif', 'for', 'while', 'do', 'return', 'break', 'continue', 'in', 'not', 'and', 'or', 'true', 'false', 'nil', 'repeat', 'until'];
  keywords.forEach(kw => {
    const regex = new RegExp(`\\b(${kw})\\b`, 'g');
    code = code.replace(regex, '<span class="keyword">$1</span>');
  });

  // 高亮函数调用
  code = code.replace(/(\w+)(\s*\()/g, '<span class="function">$1</span>$2');

  // 高亮数字
  code = code.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');

  return code;
}

// 页面加载时初始化
loadKeyData();
</script>

</body>
</html>
